name: Daily Community Sync

on:
  schedule:
    - cron: '0 5 * * *' # Runs daily at 5:00 AM UTC (1:00 AM Eastern Time)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Grants write permissions to the sync bot to push commits back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Limestone Daily Sync Engine
        run: node src/utils/syncEngine.js

      - name: Commit and Push Synced Data
        run: |
          git config --global user.name "Limestone Sync Bot"
          git config --global user.email "sync-bot@thelimestoneapp.com"
          git add src/utils/cachedEvents.json
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily community calendar sync" && git push)
